name: Plugin Compatibility Matrix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Build Plugin JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -q

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          # Exclude the original (non-shaded) jar produced by maven-shade-plugin
          path: |
            target/*.jar
            !target/original-*.jar

  test:
    name: ${{ matrix.server-type }} ${{ matrix.minecraft }} (Java ${{ matrix.java }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      # Continue testing other versions even if one fails
      fail-fast: false
      matrix:
        server-type: [paper, folia]
        minecraft: [1.12.2, 1.16.5, 1.18.2, 1.20.4, 1.21.1]
        include:
          # Bind the correct Java runtime to each Minecraft version
          - minecraft: 1.12.2
            java: 8
          - minecraft: 1.16.5
            java: 11
          - minecraft: 1.18.2
            java: 17
          - minecraft: 1.20.4
            java: 21
          - minecraft: 1.21.1
            java: 21
        exclude:
          # Folia only supports 1.19.4+, skip unsupported older versions
          - server-type: folia
            minecraft: 1.12.2
          - server-type: folia
            minecraft: 1.16.5
          - server-type: folia
            minecraft: 1.18.2

    steps:
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Download Plugin Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar
          path: server/plugins/

      - name: Download PlaceholderAPI
        run: |
          # StopTimer hard-depends on PlaceholderAPI; download it so the server can load the plugin
          curl -fsSL "https://github.com/PlaceholderAPI/PlaceholderAPI/releases/download/2.11.6/PlaceholderAPI-2.11.6.jar" \
            -o server/plugins/PlaceholderAPI.jar

      - name: Download Server Core
        id: download-server
        run: |
          mkdir -p server
          cd server

          # Fetch the latest build number for this server type and Minecraft version
          BUILD=$(curl -fs "https://api.papermc.io/v2/projects/${{ matrix.server-type }}/versions/${{ matrix.minecraft }}" | jq -r '.builds[-1]')

          if [ -z "$BUILD" ] || [ "$BUILD" = "null" ]; then
            echo "No builds found for ${{ matrix.server-type }} ${{ matrix.minecraft }}, skipping test."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Download the server JAR with an explicit output name to avoid filename ambiguity
          curl -fsSL "https://api.papermc.io/v2/projects/${{ matrix.server-type }}/versions/${{ matrix.minecraft }}/builds/${BUILD}/downloads/${{ matrix.server-type }}-${{ matrix.minecraft }}-${BUILD}.jar" \
            -o server.jar

          echo "eula=true" > eula.txt
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run Server & Verify Logs
        if: steps.download-server.outputs.skip != 'true'
        run: |
          cd server

          # Start the server and inject the stop command via pipe so it shuts down after loading
          echo "stop" | java -jar server.jar nogui

          # Check the latest log for fatal error log levels or uncaught exceptions
          if grep -qE "\[(ERROR|SEVERE)\]" logs/latest.log; then
            echo "❌ Test failed: ERROR/SEVERE found in logs!"
            grep -E "\[(ERROR|SEVERE)\]" logs/latest.log
            exit 1
          elif grep -qiE "^(Exception in thread|Caused by:|\s+at .*\(.*\))" logs/latest.log; then
            echo "❌ Test failed: Uncaught exception stack trace found in logs!"
            grep -iE "^(Exception in thread|Caused by:)" logs/latest.log
            exit 1
          else
            echo "✅ Server started successfully, plugin loaded with no fatal errors!"
          fi
