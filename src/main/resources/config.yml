# StopTimer configuration

# Language to use for all messages.
# Built-in options: en (English), zh_tw (Traditional Chinese)
# To add a custom language, create plugins/StopTimer/lang/<language>.yml
language: en

# Enable the BossBar countdown display
BossBar: true

NotifyTime:
  Title:
    # Send Title notification immediately when countdown starts
    FirstRun: false
    # Seconds remaining at which to send Title notifications
    Seconds:
      - 300
      - 60
      - 10
      - 5
      - 4
      - 3
      - 2
      - 1
  Message:
    # Send chat message notification immediately when countdown starts
    FirstRun: true
    # Seconds remaining at which to send chat message notifications
    Seconds:
      - 1800
      - 600
      - 300
      - 60
      - 10
      - 5
      - 4
      - 3
      - 2
      - 1
  Discord:
    # Send Discord notification immediately when countdown starts
    FirstRun: true
    # Seconds remaining at which to send Discord notifications
    Seconds:
      - 1800
      - 600
      - 300
      - 60
      - 10